server:
  port: 8082

spring:
  application:
    name: ms-cadastro
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:clinica_cadastro}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: 5672
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}

app:
  rabbit:
    exchange: clinica.exchange
    routing-key:
      paciente-criado: paciente.criado
      profissional-criado: profissional.criado
