server:
  port: 8081

spring:
  application:
    name: ms-auth
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:clinica_auth}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  token:
    secret: ${JWT_SECRET:clinica-secret-change-in-production}
    expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    org.springframework.security: TRACE