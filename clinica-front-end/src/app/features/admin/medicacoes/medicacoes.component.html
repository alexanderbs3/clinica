<div class="page-enter">
  <app-page-header title="Medicações" subtitle="Controle de medicamentos, estoque e validade">
    <app-btn variant="primary" (click)="openModal()">
      <svg viewBox="0 0 20 20" fill="currentColor" style="width:16px;height:16px">
        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
      </svg>
      Nova Medicação
    </app-btn>
  </app-page-header>

  <div class="table-card" *ngIf="filtered.length > 0; else empty">
    <table class="data-table">
      <thead>
        <tr>
          <th>Medicação</th>
          <th>Estoque</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let item of filtered">

          <td>
            <div style="display:flex; flex-direction:column; gap:4px;">
              <span class="item-name">{{ item.nome }}</span>

              <small *ngIf="isVencida(item.validade)" style="color:#ff6b6b;">
                Vencida
              </small>

              <small *ngIf="isEstoqueZero(item.estoque)" style="color:#ff6b6b;">
                Sem estoque
              </small>

              <small *ngIf="!isEstoqueZero(item.estoque) && isEstoqueBaixo(item.estoque)" style="color:#f7b84b;">
                Estoque baixo
              </small>
            </div>
          </td>

          <td>{{ item.estoque }}</td>

          <td>
            <span class="badge"
              [class.badge-ativo]="item.status==='ATIVO'"
              [class.badge-inativo]="item.status==='INATIVO'">
              {{ item.status }}
            </span>
          </td>

          <td>
            <div class="action-btns">

              <button class="action-btn edit"
                      (click)="openModal(item)"
                      title="Editar">
                <svg viewBox="0 0 20 20" fill="currentColor">
                  <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
                </svg>
              </button>

              <button class="action-btn deactivate"
                      *ngIf="item.status==='ATIVO'"
                      (click)="toggleStatus(item)"
                      title="Inativar">
                <svg viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M13.477 14.89A6 6 0 015.11 6.524l8.367 8.368zm1.414-1.414L6.524 5.11a6 6 0 018.367 8.367zM18 10a8 8 0 11-16 0 8 8 0 0116 0z" clip-rule="evenodd"/>
                </svg>
              </button>

            </div>
          </td>

        </tr>
      </tbody>
    </table>
  </div>

  <ng-template #empty>
    <p>Nenhuma medicação encontrada</p>
  </ng-template>
</div>

<app-modal [open]="modalOpen" [title]="editItem ? 'Editar Medicação' : 'Nova Medicação'" (close)="modalOpen=false">
  <form [formGroup]="form" (ngSubmit)="save()">

    <div class="form-grid cols-2">

      <div class="form-group" [class.has-error]="f('nome')?.invalid && f('nome')?.touched">
        <label>Nome *</label>
        <input type="text" formControlName="nome"/>
      </div>

      <div class="form-group" [class.has-error]="f('descricao')?.invalid && f('descricao')?.touched">
        <label>Descrição *</label>
        <input type="text" formControlName="descricao"/>
      </div>

      <div class="form-group" [class.has-error]="f('fornecedor')?.invalid && f('fornecedor')?.touched">
        <label>Fornecedor *</label>
        <input type="text" formControlName="fornecedor"/>
      </div>

      <div class="form-group" [class.has-error]="f('armazenamento')?.invalid && f('armazenamento')?.touched">
        <label>Armazenamento *</label>
        <select formControlName="armazenamento">
          <option value="TEMPERATURA_AMBIENTE">Temperatura ambiente</option>
          <option value="REFRIGERACAO">Refrigeração</option>
        </select>
      </div>

      <div class="form-group" [class.has-error]="f('quantidade')?.invalid && f('quantidade')?.touched">
        <label>Quantidade *</label>
        <input type="number" formControlName="quantidade" min="1" placeholder="Ex: 10"/>
        <span class="field-error" *ngIf="f('quantidade')?.touched && f('quantidade')?.invalid">
          Deve ser maior que 0
        </span>
      </div>

      <div class="form-group" [class.has-error]="f('unidadeMedida')?.invalid && f('unidadeMedida')?.touched">
        <label>Unidade de Medida *</label>
        <input type="text" formControlName="unidadeMedida" placeholder="Ex: mg, ml"/>
        <span class="field-error" *ngIf="f('unidadeMedida')?.touched && f('unidadeMedida')?.invalid">
          Campo obrigatório
        </span>
      </div>

      <div class="form-group" [class.has-error]="f('dataAquisicao')?.invalid && f('dataAquisicao')?.touched">
        <label>Data de Aquisição *</label>
        <input type="date" formControlName="dataAquisicao"/>
      </div>

      <div class="form-group" [class.has-error]="f('validade')?.invalid && f('validade')?.touched">
        <label>Validade *</label>
        <input type="date" formControlName="validade"/>
      </div>

    </div>

    <div class="modal-actions">
      <button type="button" (click)="modalOpen=false">Cancelar</button>
      <button type="submit">
        {{ editItem ? 'Atualizar' : 'Salvar' }}
      </button>
    </div>

  </form>
</app-modal>
